<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MyWebApp</title>
    <link rel="stylesheet" href="../static/css/task1.css">
</head>
<body>
    <div class="nav">
        <h1 class="logo">MyWebApp</h1>
        <ul class="menu">
            <li><a href="task1.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contect.html">Contact</a></li>
        </ul>
    </div>

    <div class="main-cont">
        <div class="about-content">
            <h1>Get In Touch</h1>
            <p>Have a question or want to work together? Drop me a message below!</p>
            
            <div class="contact-flex">
                <div class="contact-info">
                    <h3>Contact Information</h3>
                    <div class="info-item">
                        <h4>Email</h4>
                        <p>sunilchangoudnaver@gmail.com</p>
                    </div>
                    <div class="info-item">
                        <h4>Location</h4>
                        <p>SIT, Maharashtra, India</p>
                    </div>
                    <div class="info-item">
                        <h4>Education</h4>
                        <p>CS Engineering Student</p>
                    </div>
                </div>

                <div class="contact-form-wrapper">
                    <form class="contact-form">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your name" required>
                        
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                        
                        <label for="message">Message</label>
                        <textarea id="message" placeholder="How can I help you?"></textarea>
                        
                        <button type="submit" class="button form-btn">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 MyWebApp. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
